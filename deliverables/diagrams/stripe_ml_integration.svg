<svg width="100%" viewBox="0 0 740 510" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Stripe — Intégration Machine Learning : inférence et surveillance</title>
<desc>Pipeline d'inférence en deux temps (règles critiques puis modèle ML) et surveillance du modèle sur trois axes : infrastructure, drift des données, précision réelle (chargebacks)</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Légende -->
<rect x="100" y="16" width="12" height="12" rx="3" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
<text x="118" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Entrée</text>
<rect x="200" y="16" width="12" height="12" rx="3" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="218" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Traitement</text>
<rect x="320" y="16" width="12" height="12" rx="3" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="338" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Modèle</text>
<rect x="430" y="16" width="12" height="12" rx="3" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="448" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Stockage</text>

<!-- Titre -->
<text x="370" y="58" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:13px;font-style:italic;">Intégration Machine Learning — inférence et surveillance</text>

<!-- ===== Colonne gauche : pipeline d'inférence ===== -->
<text x="190" y="78" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;font-weight:500;">Inférence en deux temps</text>

<rect x="20" y="88" width="340" height="50" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
<text x="190" y="106" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Nouvelle transaction</text>
<text x="190" y="123" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">événement txn.created reçu</text>

<line x1="190" y1="138" x2="190" y2="158" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<rect x="20" y="158" width="340" height="50" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="190" y="176" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Règles critiques</text>
<text x="190" y="193" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">vélocité anormale → blocage si seuil dépassé</text>

<line x1="190" y1="208" x2="190" y2="228" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<text x="208" y="221" style="fill:rgb(156,154,146);font-family:system-ui,sans-serif;font-size:11px;font-style:italic;">sinon</text>

<rect x="20" y="228" width="340" height="50" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="190" y="246" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Récupère les features</text>
<text x="190" y="263" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">Redis (compteurs) + MongoDB (profil client)</text>

<line x1="190" y1="278" x2="190" y2="298" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<rect x="20" y="298" width="340" height="50" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="190" y="316" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Modèle ML</text>
<text x="190" y="333" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">Random Forest / XGBoost → fraud_score</text>

<line x1="190" y1="348" x2="190" y2="368" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<rect x="20" y="368" width="340" height="50" rx="8" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="190" y="386" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255, 180, 180);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Met à jour</text>
<text x="190" y="403" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220, 130, 130);font-family:system-ui,sans-serif;font-size:12px;">PostgreSQL (outbox) + MongoDB (fraud_signals)</text>

<line x1="190" y1="418" x2="190" y2="438" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<rect x="20" y="438" width="340" height="50" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="190" y="456" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Décision finale</text>
<text x="190" y="473" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">&gt; seuil → revue manuelle · sinon → autorisée</text>

<!-- ===== Colonne droite : surveillance ===== -->
<text x="565" y="78" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;font-weight:500;">Surveillance du modèle — 3 axes</text>

<rect x="400" y="100" width="320" height="70" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="560" y="120" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">1 — Infrastructure</text>
<text x="560" y="138" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">Prometheus + Grafana :</text>
<text x="560" y="154" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">latence d'inférence garantie &lt; 50 ms</text>

<rect x="400" y="190" width="320" height="70" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="560" y="210" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">2 — Drift des données</text>
<text x="560" y="228" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">EvidentlyAI calcule le PSI par feature</text>
<text x="560" y="244" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">PSI au-delà du seuil → ré-entraînement</text>

<rect x="400" y="280" width="320" height="70" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="560" y="300" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">3 — Précision réelle</text>
<text x="560" y="318" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">chargebacks = vérité terrain</text>
<text x="560" y="334" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">trop d'erreurs → ré-entraînement</text>

</svg>
