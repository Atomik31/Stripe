<svg width="100%" viewBox="0 0 740 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Stripe — Flux de données depuis Kafka</title>
<desc>Diffusion des événements Kafka vers quatre consommateurs découplés : MongoDB (NoSQL), Snowflake (OLAP), Redis (cache de features) et le moteur ML (scoring de fraude)</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Légende -->
<rect x="140" y="16" width="12" height="12" rx="3" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="158" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Bus d'événements</text>
<rect x="320" y="16" width="12" height="12" rx="3" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="338" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Stockage / cache</text>
<rect x="490" y="16" width="12" height="12" rx="3" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="508" y="26" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:12px;">Modèle</text>

<!-- Titre -->
<text x="370" y="58" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:13px;font-style:italic;">Flux de données — diffusion Kafka vers les consommateurs</text>

<!-- Kafka -->
<rect x="240" y="80" width="260" height="56" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
<text x="370" y="100" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Kafka</text>
<text x="370" y="118" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">txn.created · txn.updated · outbox</text>

<!-- Éventail vers les 4 consommateurs -->
<line x1="370" y1="136" x2="100" y2="180" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<line x1="370" y1="136" x2="280" y2="180" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<line x1="370" y1="136" x2="460" y2="180" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<line x1="370" y1="136" x2="640" y2="180" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- Consommateurs -->
<rect x="20" y="180" width="160" height="56" rx="8" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="100" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255, 180, 180);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Consumer 1</text>
<text x="100" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220, 130, 130);font-family:system-ui,sans-serif;font-size:12px;">MongoDB sink</text>

<rect x="200" y="180" width="160" height="56" rx="8" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="280" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255, 180, 180);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Consumer 2</text>
<text x="280" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220, 130, 130);font-family:system-ui,sans-serif;font-size:12px;">Snowflake (Snowpipe)</text>

<rect x="380" y="180" width="160" height="56" rx="8" style="fill:rgb(90, 30, 30);stroke:rgb(220, 100, 100);stroke-width:0.5px;"/>
<text x="460" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(255, 180, 180);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Consumer 3</text>
<text x="460" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(220, 130, 130);font-family:system-ui,sans-serif;font-size:12px;">Redis sink</text>

<rect x="560" y="180" width="160" height="56" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
<text x="640" y="200" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Consumer 4</text>
<text x="640" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">ML inference</text>

<!-- Flèches vers les destinations -->
<line x1="100" y1="236" x2="100" y2="270" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<line x1="280" y1="236" x2="280" y2="270" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<line x1="460" y1="236" x2="460" y2="270" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>
<line x1="640" y1="236" x2="640" y2="270" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px;fill:none;"/>

<!-- Destinations -->
<rect x="20" y="270" width="160" height="66" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="100" y="292" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;">Collections NoSQL</text>
<text x="100" y="310" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">events, profils, sessions</text>

<rect x="200" y="270" width="160" height="66" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="280" y="292" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;">Tables OLAP + vues</text>
<text x="280" y="310" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">agrégats jour / mois</text>

<rect x="380" y="270" width="160" height="66" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="460" y="292" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;">Cache des features</text>
<text x="460" y="310" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">compteurs de vélocité</text>

<rect x="560" y="270" width="160" height="66" rx="8" style="fill:rgb(30,30,50);stroke:rgb(80,80,120);stroke-width:0.5px;"/>
<text x="640" y="292" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 180, 220);font-family:system-ui,sans-serif;font-size:13px;">fraud_score</text>
<text x="640" y="310" text-anchor="middle" dominant-baseline="central" style="fill:rgb(140, 140, 180);font-family:system-ui,sans-serif;font-size:12px;">→ PostgreSQL + MongoDB</text>

</svg>
